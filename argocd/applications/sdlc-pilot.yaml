apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sdlc-pilot
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: ai-lab
  source:
    repoURL: git@github.com:aymenmastouri/k8s-manifests.git
    targetRevision: main
    path: apps/sdlc-pilot
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
