apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sdlc-pilot
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    # ArgoCD Image Updater — auto-deploy newest image by build date
    argocd-image-updater.argoproj.io/image-list: backend=ghcr.io/aymenmastouri/aicodegencrew-backend,frontend=ghcr.io/aymenmastouri/aicodegencrew-frontend
    argocd-image-updater.argoproj.io/backend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: ai-lab
  source:
    repoURL: git@github.com:aymenmastouri/k8s-manifests.git
    targetRevision: main
    path: apps/sdlc-pilot
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
