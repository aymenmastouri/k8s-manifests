apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # ArgoCD Image Updater — auto-deploy on new image push
    argocd-image-updater.argoproj.io/image-list: portfolio=ghcr.io/aymenmastouri/portfolio
    argocd-image-updater.argoproj.io/portfolio.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: ai-lab
  source:
    repoURL: git@github.com:aymenmastouri/k8s-manifests.git
    targetRevision: main
    path: apps/portfolio
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
