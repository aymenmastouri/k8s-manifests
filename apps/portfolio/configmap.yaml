apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-html
  namespace: apps
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Aymen Mastouri — Portfolio</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
        .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .links a { color: #60a5fa; text-decoration: none; padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 8px; transition: all 0.2s; }
        .links a:hover { background: #1e3a5f; border-color: #60a5fa; }
        .badge { display: inline-block; background: #1a3a1a; color: #4ade80; padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 0.85rem; margin-top: 2rem; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Aymen Mastouri</h1>
        <p class="subtitle">AI Engineer &amp; Platform Builder</p>
        <div class="links">
          <a href="https://ai.aymenmastouri.io">AI Lab</a>
          <a href="https://github.com/aymenmastouri">GitHub</a>
        </div>
        <span class="badge">Hosted on k3s</span>
      </div>
    </body>
    </html>
