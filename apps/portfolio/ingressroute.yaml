apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: apps
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`aymenmastouri.io`)
      kind: Rule
      services:
        - name: portfolio
          port: 80
  tls:
    secretName: portfolio-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: portfolio-tls
  namespace: apps
spec:
  secretName: portfolio-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - aymenmastouri.io
