apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-html
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AI Lab — Aymen Mastouri</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #888; margin-bottom: 2rem; }
        .badge { display: inline-block; background: #1a3a1a; color: #4ade80; padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 0.85rem; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>AI Lab</h1>
        <p>Running on k3s + ArgoCD</p>
        <span class="badge">GitOps Active</span>
      </div>
    </body>
    </html>
