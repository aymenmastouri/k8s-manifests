apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portal
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ai.aymenmastouri.io`)
      kind: Rule
      services:
        - name: portal
          port: 80
  tls:
    secretName: portal-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: portal-tls
  namespace: apps
spec:
  secretName: portal-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ai.aymenmastouri.io
