apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/instance: portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/instance: portal
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ai-lab
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: portal
          image: ghcr.io/aymenmastouri/ai-lab-portal:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
