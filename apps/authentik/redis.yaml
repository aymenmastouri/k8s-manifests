apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-redis-data
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-redis
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: [redis-server, --save, "60", "1", --loglevel, warning]
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
              cpu: 20m
            limits:
              memory: 256Mi
              cpu: 200m
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-redis
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-redis
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: authentik-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
