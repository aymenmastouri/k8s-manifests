# Traefik rate-limit middleware for Authentik.
# Protects /application/o/authorize/ and /api/v3/ from credential
# stuffing and enumeration without starving legitimate browsers.
#
# Tuned higher than first draft: the Authentik UI is a SPA that pulls
# dozens of JS chunks + fonts + images in a single page load, and
# common household NAT means multiple devices share one public IP.
# 120 req/s with 240 burst keeps brute-force useless (an attacker
# needs hours to try even 1M passwords) while never blocking real
# humans.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-ratelimit
  namespace: apps
  labels:
    app.kubernetes.io/part-of: ai-lab
spec:
  rateLimit:
    average: 120
    burst: 240
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
