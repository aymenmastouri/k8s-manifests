apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-media
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-server
    app.kubernetes.io/part-of: ai-lab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: server
          image: ghcr.io/goauthentik/server:2025.12.4
          command: [ak, server]
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-postgres
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: POSTGRES_PASSWORD
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_BOOTSTRAP_PASSWORD
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: admin@aymenmastouri.io
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-server
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: authentik-server
  ports:
    - name: http
      port: 9000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: apps
  labels:
    app.kubernetes.io/name: authentik-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2025.12.4
          command: [ak, worker]
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-postgres
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: POSTGRES_PASSWORD
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: AUTHENTIK_BOOTSTRAP_PASSWORD
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: admin@aymenmastouri.io
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
          volumeMounts:
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
