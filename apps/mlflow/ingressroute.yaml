apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mlflow
  namespace: apps
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost callback path — MUST NOT be behind the auth middleware
    - match: Host(`mlflow.aymenmastouri.io`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          port: 9000
    # Protected MLflow UI + API
    - match: Host(`mlflow.aymenmastouri.io`)
      kind: Rule
      priority: 10
      middlewares:
        - name: authentik-forwardauth
          namespace: apps
      services:
        - name: mlflow
          port: 5000
  tls:
    secretName: mlflow-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mlflow-tls
  namespace: apps
spec:
  secretName: mlflow-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mlflow.aymenmastouri.io
