apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-postgres-data
  namespace: apps
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mlflow-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  serviceName: mlflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: mlflow
            - name: POSTGRES_DB
              value: mlflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: MLFLOW_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            exec:
              command: [sh, -c, "pg_isready -U mlflow"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [sh, -c, "pg_isready -U mlflow"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: mlflow-postgres
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: mlflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
