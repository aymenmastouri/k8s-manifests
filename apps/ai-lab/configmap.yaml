apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-html
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>AI Lab — Aymen Mastouri</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,system-ui,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e0e0e8;min-height:100vh;display:flex;flex-direction:column}
    header{text-align:center;padding:3rem 1rem 2rem}
    header h1{font-size:2.4rem;font-weight:700;letter-spacing:-.02em;color:#fff}
    header p{font-size:.95rem;color:#888;margin-top:.4rem}
    .grid{max-width:900px;margin:0 auto;padding:0 1.5rem 3rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .card{background:#14141f;border:1px solid #1e1e2e;border-radius:10px;padding:1.2rem;text-decoration:none;color:#e0e0e8;transition:all .2s}
    .card:hover{background:#1a1a2e;border-color:#333;transform:translateY(-2px)}
    .card .icon{font-size:1.6rem;margin-bottom:.5rem}
    .card h3{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:.2rem}
    .card p{font-size:.78rem;color:#666;line-height:1.4}
    .card .tag{display:inline-block;font-size:.65rem;color:#444;margin-top:.5rem;font-family:monospace}
    footer{margin-top:auto;text-align:center;padding:2rem;font-size:.75rem;color:#333}
    @media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:440px){.grid{grid-template-columns:1fr}}
    </style>
    </head>
    <body>
    <header>
      <h1>AI Lab</h1>
      <p>Sovereign AI Platform &mdash; Aymen Mastouri</p>
    </header>
    <div class="grid">
      <a class="card" href="https://chat.aymenmastouri.io">
        <div class="icon">&#x1f4ac;</div>
        <h3>Open WebUI</h3>
        <p>Chat interface for local LLMs via Ollama</p>
        <span class="tag">chat.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://sdlc.aymenmastouri.io">
        <div class="icon">&#x1f916;</div>
        <h3>SDLC Pilot</h3>
        <p>AI-powered code analysis &amp; architecture docs</p>
        <span class="tag">sdlc.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://grafana.aymenmastouri.io">
        <div class="icon">&#x1f4ca;</div>
        <h3>Grafana</h3>
        <p>Dashboards, metrics &amp; monitoring</p>
        <span class="tag">grafana.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://langfuse.aymenmastouri.io">
        <div class="icon">&#x1f50d;</div>
        <h3>Langfuse</h3>
        <p>LLM observability &amp; tracing</p>
        <span class="tag">langfuse.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://mlflow.aymenmastouri.io">
        <div class="icon">&#x1f9ea;</div>
        <h3>MLflow</h3>
        <p>ML experiment tracking</p>
        <span class="tag">mlflow.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://prometheus.aymenmastouri.io">
        <div class="icon">&#x1f525;</div>
        <h3>Prometheus</h3>
        <p>Time series metrics &amp; alerting</p>
        <span class="tag">prometheus.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://qdrant.aymenmastouri.io">
        <div class="icon">&#x1f9e0;</div>
        <h3>Qdrant</h3>
        <p>Vector database for RAG</p>
        <span class="tag">qdrant.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://llm.aymenmastouri.io">
        <div class="icon">&#x26a1;</div>
        <h3>LiteLLM</h3>
        <p>Unified LLM API proxy</p>
        <span class="tag">llm.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://auth.aymenmastouri.io">
        <div class="icon">&#x1f512;</div>
        <h3>Authentik</h3>
        <p>SSO &amp; identity provider</p>
        <span class="tag">auth.aymenmastouri.io</span>
      </a>
      <a class="card" href="https://aymenmastouri.io">
        <div class="icon">&#x1f310;</div>
        <h3>Portfolio</h3>
        <p>Personal site &amp; projects</p>
        <span class="tag">aymenmastouri.io</span>
      </a>
    </div>
    <footer>Powered by k3s &middot; ArgoCD &middot; GitOps</footer>
    </body>
    </html>
