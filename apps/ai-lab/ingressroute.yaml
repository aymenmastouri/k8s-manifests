apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ai-lab-tls
  namespace: apps
spec:
  secretName: ai-lab-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ai.aymenmastouri.io
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ai-lab
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-lab
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost callback path — MUST NOT be behind the auth middleware
    - match: Host(`ai.aymenmastouri.io`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          port: 9000
    # Protected AI Lab portal
    - match: Host(`ai.aymenmastouri.io`)
      kind: Rule
      priority: 10
      middlewares:
        - name: authentik-forwardauth
          namespace: apps
      services:
        - name: ai-lab
          port: 80
  tls:
    secretName: ai-lab-tls
