apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lab
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-lab
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-lab
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ai-lab
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: nginx
          image: ghcr.io/aymenmastouri/ai-lab-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: 8Mi
              cpu: 5m
            limits:
              memory: 32Mi
              cpu: 50m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-lab
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-lab
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: ai-lab
  ports:
    - name: http
      port: 80
      targetPort: http
