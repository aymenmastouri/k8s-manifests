apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          resources:
            requests:
              memory: 8Mi
              cpu: 5m
            limits:
              memory: 32Mi
              cpu: 50m
      volumes:
        - name: html
          configMap:
            name: portal-html
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: apps
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: portal
  ports:
    - name: http
      port: 80
      targetPort: http
