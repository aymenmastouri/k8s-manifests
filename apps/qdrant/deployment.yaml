apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-storage
  namespace: apps
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-snapshots
  namespace: apps
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: ai-lab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: apps
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-db
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/component: vector-db
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.17.1
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-secrets
                  key: QDRANT__SERVICE__API_KEY
            - name: QDRANT__SERVICE__ENABLE_TLS
              value: "false"
            - name: QDRANT__LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
            - name: snapshots
              mountPath: /qdrant/snapshots
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-storage
        - name: snapshots
          persistentVolumeClaim:
            claimName: qdrant-snapshots
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: apps
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
