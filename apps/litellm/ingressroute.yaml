apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: apps
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`llm.aymenmastouri.io`)
      kind: Rule
      services:
        - name: litellm
          port: 4000
  tls:
    secretName: litellm-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litellm-tls
  namespace: apps
spec:
  secretName: litellm-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - llm.aymenmastouri.io
