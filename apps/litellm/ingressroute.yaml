apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: apps
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost callback path — MUST NOT be behind the auth middleware
    - match: Host(`llm.aymenmastouri.io`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          port: 9000
    # Protected UI + public API via Ingress. In-cluster apps (open-webui,
    # sdlc-pilot) hit http://litellm:4000 with LITELLM_MASTER_KEY and
    # bypass the ingress entirely, so adding SSO does not break them.
    - match: Host(`llm.aymenmastouri.io`)
      kind: Rule
      priority: 10
      middlewares:
        - name: authentik-forwardauth
          namespace: apps
      services:
        - name: litellm
          port: 4000
  tls:
    secretName: litellm-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litellm-tls
  namespace: apps
spec:
  secretName: litellm-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - llm.aymenmastouri.io
