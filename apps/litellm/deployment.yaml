apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: apps
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
data:
  config.yaml: |
    model_list:
      # === LOCAL MODELS (Ollama) ===
      - model_name: qwen2.5-3b
        litellm_params:
          model: ollama/qwen2.5:3b
          api_base: http://ollama:11434
          stream: true
      - model_name: llama3.2-3b
        litellm_params:
          model: ollama/llama3.2:3b
          api_base: http://ollama:11434
          stream: true
      - model_name: nomic-embed
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama:11434
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama:11434
      # === CLOUD MODELS (HuggingFace) ===
      - model_name: qwen3.5-9b
        litellm_params:
          model: openai/Qwen/Qwen3.5-9B:together
          api_base: https://router.huggingface.co/v1
          api_key: os.environ/HUGGINGFACE_API_KEY
          stream: true
          max_tokens: 4096
          temperature: 0.7
          top_p: 0.8
          presence_penalty: 1.5
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
      - model_name: qwen3.5-9b-think
        litellm_params:
          model: openai/Qwen/Qwen3.5-9B:together
          api_base: https://router.huggingface.co/v1
          api_key: os.environ/HUGGINGFACE_API_KEY
          stream: true
          max_tokens: 32768
          temperature: 1.0
          top_p: 0.95
          presence_penalty: 1.5
      - model_name: qwen3-coder
        litellm_params:
          model: openai/Qwen/Qwen3-Coder-Next:novita
          api_base: https://router.huggingface.co/v1
          api_key: os.environ/HUGGINGFACE_API_KEY
          stream: true
          max_tokens: 8192
          temperature: 1.0
          top_p: 0.95
      - model_name: gpt-oss-120b
        litellm_params:
          model: openai/openai/gpt-oss-120b:novita
          api_base: https://router.huggingface.co/v1
          api_key: os.environ/HUGGINGFACE_API_KEY
          stream: true
          max_tokens: 8192
          temperature: 1.0
          top_p: 0.95
    litellm_settings:
      drop_params: true
      set_verbose: false
      json_logs: true
      request_timeout: 600
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: apps
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: llm-proxy
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/component: llm-proxy
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          command: [litellm, --config, /app/config.yaml, --port, "4000", --num_workers, "1"]
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
            - name: HUGGINGFACE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: HUGGINGFACE_API_KEY
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_UI_USERNAME
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_UI_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: apps
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - name: http
      port: 4000
      targetPort: http
