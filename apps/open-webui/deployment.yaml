apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: apps
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: apps
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: chat-ui
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/component: chat-ui
        app.kubernetes.io/part-of: ai-lab
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:v0.8.12
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://litellm:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: LITELLM_MASTER_KEY
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: ENABLE_SIGNUP
              value: "false"
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: OPEN_WEBUI_SECRET_KEY
            - name: WEBUI_URL
              value: "https://chat.aymenmastouri.io"
            - name: DEFAULT_MODELS
              value: "qwen2.5-3b"
            # RAG Configuration
            - name: RAG_EMBEDDING_ENGINE
              value: "openai"
            - name: RAG_EMBEDDING_MODEL
              value: "nomic-embed"
            - name: RAG_OPENAI_API_BASE_URL
              value: "http://litellm:4000/v1"
            - name: RAG_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: LITELLM_MASTER_KEY
            - name: RAG_EMBEDDING_BATCH_SIZE
              value: "10"
            - name: VECTOR_DB
              value: "qdrant"
            - name: QDRANT_URI
              value: "http://qdrant:6333"
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: QDRANT_API_KEY
            - name: CHUNK_SIZE
              value: "1500"
            - name: CHUNK_OVERLAP
              value: "100"
            - name: RAG_TOP_K
              value: "5"
            # OIDC (Authentik)
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: OPENWEBUI_OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: OPENWEBUI_OAUTH_CLIENT_SECRET
            - name: OPENID_PROVIDER_URL
              value: "https://auth.aymenmastouri.io/application/o/open-webui/.well-known/openid-configuration"
            - name: OAUTH_PROVIDER_NAME
              value: "Authentik"
            - name: OPENID_REDIRECT_URI
              value: "https://chat.aymenmastouri.io/oauth/oidc/callback"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: apps
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: ai-lab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: http
