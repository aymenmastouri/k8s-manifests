# kube-prometheus-stack Helm Values
# Optimiert für Single-Node k3s VPS

# ─── Grafana ─────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminUser: admin
  adminPassword: ""  # SSO via Authentik — kein statisches Passwort
  persistence:
    enabled: true
    size: 2Gi
  # PVC already has correct ownership from previous runs. init-chown-data
  # was crash-looping after the helm upgrade (runs as a non-root user
  # and chown fails on pre-existing dirs it didn't create). Skip it.
  initChownData:
    enabled: false
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 300m
  # Grafana behind Traefik — kein eigener Ingress
  ingress:
    enabled: false
  # Default Dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Berlin

  # ─── Loki datasource (audit/log exploration) ────────────────────────
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring:3100/
      access: proxy
      jsonData:
        maxLines: 2000

  # Sidecar picks up dashboards from ConfigMaps labelled `grafana_dashboard=1`
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      labelValue: "1"

  # ─── Authentik OIDC (native integration) ────────────────────────────
  # CLIENT_ID + CLIENT_SECRET come from the grafana-oidc SealedSecret.
  envFromSecret: grafana-oidc
  grafana.ini:
    server:
      root_url: https://grafana.aymenmastouri.io
    auth:
      signout_redirect_url: https://auth.aymenmastouri.io/application/o/grafana/end-session/
      oauth_auto_login: true
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      # client_id / client_secret injected via envFromSecret:
      #   GF_AUTH_GENERIC_OAUTH_CLIENT_ID / GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      scopes: "openid profile email"
      empty_scopes: false
      auth_url: https://auth.aymenmastouri.io/application/o/authorize/
      token_url: https://auth.aymenmastouri.io/application/o/token/
      api_url: https://auth.aymenmastouri.io/application/o/userinfo/
      allow_sign_up: true
      role_attribute_path: contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'
      role_attribute_strict: false
      use_pkce: true

# ─── Prometheus ──────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "5GB"
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Scrape alle ServiceMonitors in allen Namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# ─── AlertManager ────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# ─── Node Exporter ───────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── kube-state-metrics ──────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── k3s Anpassungen ────────────────────────────────────────────────
# k3s bündelt etcd/scheduler/controller-manager — diese Exporter deaktivieren
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
