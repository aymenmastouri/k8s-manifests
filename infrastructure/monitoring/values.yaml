# kube-prometheus-stack Helm Values
# Optimiert für Single-Node k3s VPS

# ─── Grafana ─────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminUser: admin
  adminPassword: ""  # SSO via Authentik — kein statisches Passwort
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 300m
  # Grafana behind Traefik — kein eigener Ingress
  ingress:
    enabled: false
  # Default Dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Berlin

# ─── Prometheus ──────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "5GB"
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Scrape alle ServiceMonitors in allen Namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# ─── AlertManager ────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# ─── Node Exporter ───────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── kube-state-metrics ──────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── k3s Anpassungen ────────────────────────────────────────────────
# k3s bündelt etcd/scheduler/controller-manager — diese Exporter deaktivieren
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
