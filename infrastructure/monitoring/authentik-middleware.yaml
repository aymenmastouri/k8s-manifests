# Authentik ForwardAuth Middleware for the monitoring namespace.
# Referenced by prometheus + grafana IngressRoutes. Points at the
# embedded Authentik outpost (apps NS) that serves the domain-wide
# forward_domain provider.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: monitoring
  labels:
    app.kubernetes.io/name: authentik-forwardauth
    app.kubernetes.io/part-of: ai-lab
spec:
  forwardAuth:
    # authentik-server lives in apps NS; ForwardAuth uses FQDN so no
    # cross-namespace Service ref is needed here. The outpost-callback
    # IngressRoute path routes through the ExternalName Service defined
    # in this same manifest file (see below).
    address: http://authentik-server.apps.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
# Cross-namespace bridge: Traefik IngressRoutes in `monitoring` cannot
# reference `authentik-server` in `apps` directly (k3s Traefik has no
# allowCrossNamespace flag set). An ExternalName Service points at the
# FQDN so the IngressRoute can route locally.
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: monitoring
  labels:
    app.kubernetes.io/name: authentik-server
    app.kubernetes.io/part-of: ai-lab
spec:
  type: ExternalName
  externalName: authentik-server.apps.svc.cluster.local
  ports:
    - name: http
      port: 9000
      targetPort: 9000
